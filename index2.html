    <p><p>Virgínia Fonseca</p>A influenciadora e empresária Virgínia Fonseca, 27, ultrapassou a atriz Tatá Werneck, 42, em números de seguidores neste sábado (23).

De acordo com dados da plataforma Social Blade, que monitora estatísticas de crescimentos de criadores de conteúdo, Virginia ganhou cerca de 3 milhões de seguidores após o término do relacionamento com Vini Jr, em 15 de maio.</p>

<p> 56,2 milhões de seguidores, ela ultrapassou os 54,7 milhões da Tatá Werneck e se tornou a segunda mulher brasileira mais seguida no Instagram. A primeira continua sendo a cantora Anitta, 33, com 61,3 milhões de seguidores.

Na sequência, após Tatá Werneck, que agora ocupa o terceiro lugar, está a atriz Larissa Manoela, 25, com 52,1 milhões. E como a 5ª mulher mais seguida no Brasil está Maisa, 24, com 46,7 milhões de seguidores.</p>
