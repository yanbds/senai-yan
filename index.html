<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulário Personalizado</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color: #eb5fa531;
        }

        .card-form{
            max-width: 800px;
            margin: 40px auto;
            border-radius: 15px;
        }

        .resultado{
            background-color: #eef5ff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card shadow card-form">
        <div class="card-header bg-primary text-white">
            <h3>Formulário Completo</h3>
        </div>

        <div class="card-body">

            <form>

                <!-- Nome -->
                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" class="form-control" placeholder="Digite seu nome">
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" class="form-control" placeholder="Digite seu e-mail">
                </div>

                <!-- Data -->
                <div class="mb-3">
                    <label class="form-label">Data de Nascimento</label>
                    <input type="date" class="form-control">
                </div>

                <!-- Select -->
                <div class="mb-3">
                    <label class="form-label">Estado Civil</label>
                    <select class="form-select">
                        <option selected>Selecione</option>
                        <option>Solteiro(a)</option>
                        <option>Casado(a)</option>
                        <option>Divorciado(a)</option>
                    </select>
                </div>

                <!-- Radios -->
                <div class="mb-3">
                    <label class="form-label d-block">Sexo</label>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="sexo">
                        <label class="form-check-label">Masculino</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="sexo">
                        <label class="form-check-label">Feminino</label>
                    </div>
                </div>

                <!-- Checkbox -->
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input">
                    <label class="form-check-label">
                        Aceito os termos de uso
                    </label>
                </div>

                <!-- Upload -->
                <div class="mb-3">
                    <label class="form-label">Enviar Documento</label>
                    <input type="file" class="form-control">
                </div>

                <!-- CEP -->
                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label">CEP</label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="myInput"
                            placeholder="Digite o CEP">
                    </div>

                    <div class="col-md-4 d-flex align-items-end mb-3">
                        <button 
                            type="button"
                            onclick="buscarCEP()" 
                            class="btn btn-success w-100">
                            Buscar CEP
                        </button>
                    </div>
                </div>

                <!-- Resultado -->
                <div id="myDiv" class="resultado"></div>

                <!-- Observações -->
                <div class="mb-3 mt-3">
                    <label class="form-label">Observações</label>
                    <textarea 
                        class="form-control" 
                        rows="4"
                        placeholder="Digite uma observação">
                    </textarea>
                </div>

                <!-- Botões -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        Salvar
                    </button>

                    <button type="reset" class="btn btn-secondary">
                        Limpar
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

<script>

async function buscarCEP() {

    let cep = document.getElementById("myInput").value
    let div = document.getElementById("myDiv")

    if(cep === ""){
        div.innerHTML = `
            <div class="alert alert-warning">
                Digite um CEP.
            </div>
        `
        return
    }

    try {

        const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`)
        const data = await response.json()

        if(data.erro){
            div.innerHTML = `
                <div class="alert alert-danger">
                    CEP não encontrado.
                </div>
            `
            return
        }

        div.innerHTML = `
            <h5>Endereço Encontrado</h5>

            <strong>CEP:</strong> ${data.cep}<br>
            <strong>Logradouro:</strong> ${data.logradouro}<br>
            <strong>Bairro:</strong> ${data.bairro}<br>
            <strong>Cidade:</strong> ${data.localidade}<br>
            <strong>Estado:</strong> ${data.uf}
        `

    } catch(error){

        div.innerHTML = `
            <div class="alert alert-danger">
                Erro ao buscar CEP.
            </div>
        `
    }
}

</script>

</body>
</html>
